<!DOCTYPE html>
<html lang="en"{% if page.theme %} data-theme="{{ page.theme }}"{% endif %}>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
<meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 200 }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">
<meta property="og:type" content="website">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:title" content="{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}">
<meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 200 }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta name="twitter:card" content="summary">
<link rel="alternate" type="application/atom+xml" title="{{ site.title }} — Writing" href="{{ '/feed.xml' | relative_url }}">
<script>
(function(){
  var h = document.documentElement;
  if (h.hasAttribute('data-theme')) return;
  var saved = null;
  try { saved = localStorage.getItem('theme'); } catch(e){}
  var dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
  h.setAttribute('data-theme', dark ? 'dark' : 'light');
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

<a class="skip mono" href="#top">Skip to content</a>

<nav class="mono">
  <a class="brand" href="{{ '/' | relative_url }}">Isaiah Buchberger</a>
  <div class="links">
    <a href="{{ '/' | relative_url }}#research">Research</a>
    <a href="{{ '/' | relative_url }}#about">About</a>
    <a href="{{ '/writing/' | relative_url }}"{% if page.url contains '/writing' %} class="here" aria-current="page"{% endif %}>Writing</a>
    <a href="{{ '/papers/' | relative_url }}"{% if page.url contains '/papers' %} class="here" aria-current="page"{% endif %}>Papers</a>
  </div>
  <div class="right">
    <button class="ghost" id="theme-toggle" type="button" aria-pressed="false">Dark</button>
    <a class="ghost" href="mailto:{{ site.email }}">Contact</a>
  </div>
</nav>

{{ content }}

<footer class="mono">
  <div class="loctime"><span class="dot" aria-hidden="true"></span>Chicago, IL <span id="clock"></span></div>
  <div class="mail"><a href="mailto:{{ site.email }}">{{ site.email }}</a></div>
  <div class="fine">Culture &middot; Politics &middot; Political Economy</div>
</footer>

<script src="{{ '/assets/js/main.js' | relative_url }}"></script>

</body>
</html>
